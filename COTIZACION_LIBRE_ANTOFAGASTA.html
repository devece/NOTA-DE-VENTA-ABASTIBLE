<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotización Libre Antofagasta - Abastible</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="libs/exceljs.min.js"></script>
<style>
    :root {
        --aba-orange: #FE5100;
        --aba-orange-dark: #E04E00;
        --aba-orange-light: #FEF2E8;
        --aba-blue: #001489;
        --aba-blue-dark: #00106E;
        --aba-blue-light: #EBEEF9;
        --aba-gray: #54585A;
        --aba-silver: #F8F8F8;
        --aba-border: #E5E7EB;
    }
    body { font-family: Arial, Helvetica, sans-serif; background: var(--aba-silver); }
    .btn-primary { background: var(--aba-orange); color: #fff; font-weight: 600; padding: 10px 18px; border-radius: 8px; transition: background .15s; }
    .btn-primary:hover { background: var(--aba-orange-dark); }
    .btn-secondary { background: var(--aba-blue); color: #fff; font-weight: 600; padding: 10px 18px; border-radius: 8px; transition: background .15s; }
    .btn-secondary:hover { background: var(--aba-blue-dark); }
    .cat-header { background: var(--aba-blue); color: #fff; cursor: pointer; }
    .cat-header:hover { background: var(--aba-blue-dark); }
    table.items { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.items th { background: var(--aba-blue-light); color: var(--aba-blue); text-align: left; padding: 6px 8px; position: sticky; top: 0; }
    table.items td { padding: 5px 8px; border-bottom: 1px solid var(--aba-border); }
    table.items tbody tr:hover td { background: var(--aba-orange-light); }
    table.items tbody tr.has-qty td { background: #FFFBEB; }
    .input-num { width: 90px; border: 1px solid var(--aba-border); border-radius: 6px; padding: 4px 6px; text-align: right; }
    .input-num:focus { outline: 2px solid var(--aba-orange); border-color: var(--aba-orange); }
    .input-num[disabled] { background: var(--aba-silver); color: var(--aba-gray); }
    .subtotal-row td { background: var(--aba-blue-light); font-weight: 700; color: var(--aba-blue); border-top: 2px solid var(--aba-blue); }
    .moi-row td { background: var(--aba-orange-light); font-weight: 700; color: var(--aba-orange-dark); }
    .cat-fixed-badge { font-size: 10px; background: var(--aba-blue-light); color: var(--aba-blue); padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .summary-card { border-radius: 12px; padding: 14px; text-align: center; }
    ::-webkit-scrollbar { height: 10px; width: 10px; }
</style>
</head>
<body>

<div class="sticky top-0 z-30 bg-white border-b shadow-sm" style="border-color: var(--aba-border);">
    <div class="max-w-7xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
        <div>
            <h1 class="text-lg font-bold" style="color: var(--aba-blue);">📋 Cotización Libre — Planta Antofagasta</h1>
            <div class="text-xs" style="color: var(--aba-gray);">Ingresá tus valores por ítem. La app calcula la diferencia contra el precio Renova y la agrega como MOI por categoría.</div>
        </div>
        <div class="flex gap-2">
            <button onclick="exportarExcel()" class="btn-primary">📊 Exportar a Excel</button>
            <button onclick="window.print()" class="btn-secondary">🖨️ Imprimir</button>
        </div>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 py-5">

    <!-- Datos del proyecto -->
    <div class="bg-white rounded-lg border p-4 mb-5" style="border-color: var(--aba-border);">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
            <div>
                <label class="block text-xs font-semibold uppercase mb-1" style="color: var(--aba-gray);">Proyecto</label>
                <input id="fProyecto" type="text" class="w-full border rounded-lg px-3 py-2" style="border-color: var(--aba-border);" placeholder="Nombre del proyecto">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase mb-1" style="color: var(--aba-gray);">Cliente</label>
                <input id="fCliente" type="text" class="w-full border rounded-lg px-3 py-2" style="border-color: var(--aba-border);" placeholder="Nombre del cliente">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase mb-1" style="color: var(--aba-gray);">RUT / ID</label>
                <input id="fRut" type="text" class="w-full border rounded-lg px-3 py-2" style="border-color: var(--aba-border);">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase mb-1" style="color: var(--aba-gray);">Centro</label>
                <input type="text" value="Planta Antofagasta" disabled class="w-full border rounded-lg px-3 py-2 bg-gray-100" style="border-color: var(--aba-border); color: var(--aba-gray);">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase mb-1" style="color: var(--aba-gray);">Fecha</label>
                <input id="fFecha" type="date" class="w-full border rounded-lg px-3 py-2" style="border-color: var(--aba-border);">
            </div>
        </div>
    </div>

    <!-- Buscador -->
    <div class="mb-4">
        <input id="buscador" type="text" oninput="filtrar(this.value)" placeholder="🔎 Buscar ítem por código o descripción..." class="w-full border rounded-lg px-3 py-2" style="border-color: var(--aba-border);">
    </div>

    <!-- Resumen -->
    <div class="bg-white rounded-lg border-2 overflow-hidden mb-5" style="border-color: var(--aba-blue);">
        <div class="text-white px-4 py-2 font-bold text-sm" style="background: var(--aba-blue);">📊 RESUMEN</div>
        <div class="p-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="summary-card" style="background: #EBEEF9;">
                    <div class="text-xs font-semibold uppercase" style="color: var(--aba-blue);">Total Base Renova</div>
                    <div id="sumRenova" class="text-2xl font-bold mt-1" style="color: var(--aba-blue);">$0</div>
                </div>
                <div class="summary-card" style="background: #FEF2E8;">
                    <div class="text-xs font-semibold uppercase" style="color: var(--aba-orange);">Total Mano de Obra Industrial</div>
                    <div id="sumMOI" class="text-2xl font-bold mt-1" style="color: var(--aba-orange);">$0</div>
                </div>
                <div class="summary-card" style="background: #E8F5E9;">
                    <div class="text-xs font-semibold uppercase" style="color: #2E7D32;">Total Contratista</div>
                    <div id="sumContratista" class="text-2xl font-bold mt-1" style="color: #2E7D32;">$0</div>
                </div>
            </div>
            <div class="mt-4 p-3 text-center rounded-lg bg-green-100 border border-green-300">
                <div class="font-bold text-sm text-green-700">✅ Base Renova + MOI = Total Contratista</div>
                <div id="formulaCheck" class="text-xs mt-1 font-mono">$0 + $0 = $0</div>
            </div>
        </div>
    </div>

    <div id="categorias"></div>

</div>

const ORDEN_CATS = Object.keys(BASE);

function fmt(n) {
    n = Number(n) || 0;
    if (n === 0) return "0";
    return Math.round(n).toLocaleString("es-CL");
}
function fmtMoney(n) { return '$' + fmt(n); }
function fmtMoneyColor(n) {
    n = Number(n) || 0;
    const signo = n > 0 ? '+$' : n < 0 ? '-$' : '$';
    const cls = n > 0 ? 'text-orange-600' : n < 0 ? 'text-red-600' : '';
    return `<span class="${cls}">${signo}${fmt(Math.abs(n))}</span>`;
}

function construirTablas() {
    const cont = document.getElementById('categorias');
    let html = '';
    ORDEN_CATS.forEach((cat, catIdx) => {
        const items = BASE[cat];
        if (!items || items.length === 0) return;
        const esFijo = CATS_PRECIO_FIJO.includes(cat);
        html += `<div class="bg-white rounded-lg border mb-4 overflow-hidden" style="border-color: var(--aba-border);">
            <div class="cat-header px-4 py-2 font-bold text-sm flex items-center justify-between" onclick="toggleCat(${catIdx})">
                <span>${cat} <span class="text-xs font-normal opacity-80">(${items.length} ítems)</span></span>
                ${esFijo ? '<span class="cat-fixed-badge" style="background:rgba(255,255,255,.2); color:#fff;">PRECIO FIJO RENOVA — SIN MOI</span>' : ''}
            </div>
            <div id="catBody${catIdx}" class="overflow-x-auto">
                <table class="items">
                    <thead><tr>
                        <th>Código</th><th>Descripción</th><th>Unidad</th>
                        <th class="text-right">Cant.</th>
                        <th class="text-right">Precio Renova</th>
                        <th class="text-right">Total Renova</th>
                        <th class="text-right">Precio Contratista</th>
                        <th class="text-right">Total Contratista</th>
                        <th class="text-right">Diferencia</th>
                    </tr></thead>
                    <tbody id="catTbody${catIdx}">`;
        items.forEach((it, itIdx) => {
            html += `<tr class="row" data-cat="${catIdx}" data-it="${itIdx}" data-search="${(it.c + ' ' + it.d).toLowerCase()}">
                <td class="text-xs" style="color:var(--aba-gray);">${it.c.replace(/^0+/, '') || '-'}</td>
                <td>${it.d}</td>
                <td class="text-center">${it.u}</td>
                <td class="text-right"><input type="number" min="0" step="0.5" class="input-num inp-cant" value="" oninput="recalcFila(${catIdx},${itIdx})"></td>
                <td class="text-right">${fmtMoney(it.p)}</td>
                <td class="text-right cell-totrenova">$0</td>
                <td class="text-right"><input type="text" inputmode="decimal" class="input-num inp-precio" value="${esFijo ? it.p : ''}" placeholder="${esFijo ? '' : 'Ingrese valor'}" ${esFijo ? 'disabled' : ''} oninput="recalcFila(${catIdx},${itIdx})"></td>
                <td class="text-right cell-totctta">$0</td>
                <td class="text-right cell-dif">$0</td>
            </tr>`;
        });
        html += `</tbody>
                    <tfoot>
                        <tr class="subtotal-row"><td colspan="5" class="text-right">SUBTOTAL ${cat}</td><td class="text-right" id="subRenova${catIdx}">$0</td><td></td><td class="text-right" id="subContratista${catIdx}">$0</td><td class="text-right" id="subDif${catIdx}">$0</td></tr>
                        ${esFijo ? '' : `<tr class="moi-row"><td colspan="5" class="text-right">🛠️ MANO DE OBRA INDUSTRIAL (${cat})</td><td></td><td></td><td></td><td class="text-right" id="moi${catIdx}">$0</td></tr>`}
                    </tfoot>
                </table>
            </div>
        </div>`;
    });
    cont.innerHTML = html;
}

function toggleCat(catIdx) {
    const body = document.getElementById('catBody' + catIdx);
    body.style.display = (body.style.display === 'none') ? '' : 'none';
}

function recalcFila(catIdx, itIdx) {
    const row = document.querySelector(`tr.row[data-cat="${catIdx}"][data-it="${itIdx}"]`);
    const it = BASE[ORDEN_CATS[catIdx]][itIdx];
    const cant = parseFloat(row.querySelector('.inp-cant').value) || 0;
    const precioCtta = parseFloat(row.querySelector('.inp-precio').value) || 0;
    const totRenova = cant * it.p;
    const totCtta = cant * precioCtta;
    const dif = totCtta - totRenova;
    row.querySelector('.cell-totrenova').textContent = fmtMoney(totRenova);
    row.querySelector('.cell-totctta').textContent = fmtMoney(totCtta);
    row.querySelector('.cell-dif').innerHTML = fmtMoneyColor(dif);
    row.classList.toggle('has-qty', cant > 0);
    recalcCategoria(catIdx);
    recalcTotalGeneral();
}

function recalcCategoria(catIdx) {
    const cat = ORDEN_CATS[catIdx];
    const items = BASE[cat];
    let subRenova = 0, subCtta = 0;
    items.forEach((it, itIdx) => {
        const row = document.querySelector(`tr.row[data-cat="${catIdx}"][data-it="${itIdx}"]`);
        const cant = parseFloat(row.querySelector('.inp-cant').value) || 0;
        if (cant <= 0) return;
        const precioCtta = parseFloat(row.querySelector('.inp-precio').value) || 0;
        subRenova += cant * it.p;
        subCtta += cant * precioCtta;
    });
    const moi = subCtta - subRenova;
    document.getElementById('subRenova' + catIdx).textContent = fmtMoney(subRenova);
    document.getElementById('subContratista' + catIdx).textContent = fmtMoney(subCtta);
    document.getElementById('subDif' + catIdx).innerHTML = fmtMoneyColor(moi);
    const moiCell = document.getElementById('moi' + catIdx);
    if (moiCell) moiCell.innerHTML = fmtMoneyColor(moi);
}

function recalcTotalGeneral() {
    let totalRenova = 0, totalCtta = 0;
    ORDEN_CATS.forEach((cat, catIdx) => {
        const items = BASE[cat];
        items.forEach((it, itIdx) => {
            const row = document.querySelector(`tr.row[data-cat="${catIdx}"][data-it="${itIdx}"]`);
            const cant = parseFloat(row.querySelector('.inp-cant').value) || 0;
            if (cant <= 0) return;
            const precioCtta = parseFloat(row.querySelector('.inp-precio').value) || 0;
            totalRenova += cant * it.p;
            totalCtta += cant * precioCtta;
        });
    });
    const totalMOI = totalCtta - totalRenova;
    document.getElementById('sumRenova').textContent = fmtMoney(totalRenova);
    document.getElementById('sumMOI').textContent = fmtMoney(totalMOI);
    document.getElementById('sumContratista').textContent = fmtMoney(totalCtta);
    document.getElementById('formulaCheck').textContent = `${fmtMoney(totalRenova)} + ${fmtMoney(totalMOI)} = ${fmtMoney(totalRenova + totalMOI)}`;
}

function filtrar(q) {
    q = (q || '').toLowerCase().trim();
    document.querySelectorAll('tr.row').forEach(row => {
        const match = !q || row.dataset.search.includes(q);
        row.style.display = match ? '' : 'none';
    });
}

    const workbook = new ExcelJS.Workbook();
    const sheet = workbook.addWorksheet('COTIZACION');

        white: 'FFFFFFFF', silver: 'FFF5F5F5', gray: 'FF54585A',
        gridLine: 'FFD9D9D9', red: 'FFDC2626', green: 'FF2E7D32'

    const MONEY = '_-$* #,##0_-;-$* #,##0_-;_-$* "-"??_-;_-@_-';
    function fillSolid(argb) { return { type: 'pattern', pattern: 'solid', fgColor: { argb } }; }
    function gridBorder() { const s = { style: 'thin', color: { argb: C.gridLine } }; return { top: s, bottom: s, left: s, right: s }; }

    sheet.columns = [{ width: 14 }, { width: 28 }, { width: 8 }, { width: 9 }, { width: 12 }, { width: 12 }, { width: 12 }, { width: 12 }, { width: 12 }];

    sheet.mergeCells('A1:I1');
    sheet.getRow(1).height = 28;

    banner.alignment = { horizontal: 'center', vertical: 'middle' };

    const campos = [
        ['PROYECTO', document.getElementById('fProyecto').value || '-'],
        ['CLIENTE', document.getElementById('fCliente').value || '-'],
        ['RUT / ID', document.getElementById('fRut').value || '-'],
        ['CENTRO', CENTRO],
        ['FECHA', document.getElementById('fFecha').value || '-'],
    ];
    let r = 2;
    campos.forEach(([k, v]) => {
        sheet.mergeCells(r, 1, r, 2);
        const lbl = sheet.getCell(r, 1);
        lbl.value = k; lbl.font = { name: 'Arial', bold: true, size: 8, color: { argb: C.gray } };

        const val = sheet.getCell(r, 3);
        val.value = v; val.font = { name: 'Arial', bold: true, size: 9, color: { argb: C.blue } };

        r++;
    });

    const filaSep = r;
    sheet.getRow(filaSep).height = 4;
    sheet.mergeCells(`A${filaSep}:I${filaSep}`);
    sheet.getCell(`A${filaSep}`).fill = fillSolid(C.blue);
    r++;

    const filaHeader = r;
    sheet.getRow(filaHeader).height = 24;
    ['CÓDIGO', 'DESCRIPCIÓN', 'UNIDAD', 'CANT.', 'PRECIO\nRENOVA', 'TOTAL\nRENOVA', 'PRECIO\nCONTRATISTA', 'TOTAL\nCONTRATISTA', 'DIFERENCIA'].forEach((h, i) => {

    });
    r++;

    let totalGeneralRenova = 0, totalGeneralMOI = 0, totalGeneralContratista = 0;

    ORDEN_CATS.forEach((cat, catIdx) => {
        const items = BASE[cat];
        if (!items || items.length === 0) return;
        const esFijo = CATS_PRECIO_FIJO.includes(cat);
        let subRenova = 0, subCtta = 0;

        const cantidades = items.map((it, itIdx) => {

            return parseFloat(row.querySelector('.inp-cant').value) || 0;
        });
        const huboItems = cantidades.some(c => c > 0);

            const row = document.querySelector(`tr.row[data-cat="${catIdx}"][data-it="${itIdx}"]`);

            const totCtta = cant * precioCtta;
            const dif = totCtta - totRenova;
            subRenova += totRenova;
            subCtta += totCtta;

            const fila = [it.c.replace(/^0+/, '') || '-', it.d, it.u, cant, it.p, totRenova, precioCtta, totCtta, dif];
            fila.forEach((v, i) => {
                const col = i + 1;

        });

        const moi = subCtta - subRenova;
        sheet.mergeCells(r, 1, r, 4);
        const subLbl = sheet.getCell(r, 1);
        subLbl.value = 'SUBTOTAL ' + cat;
        subLbl.font = { name: 'Arial', bold: true, size: 9, color: { argb: C.blueDark } };
        subLbl.fill = fillSolid(C.blueL);
        subLbl.alignment = { horizontal: 'right', vertical: 'middle' };
        [5, 6, 7, 8, 9].forEach(col => {
            const cell = sheet.getCell(r, col);
            cell.fill = fillSolid(C.blueL);
            cell.font = { name: 'Arial', bold: true, size: 9, color: { argb: C.blueDark } };
            cell.alignment = { horizontal: 'right', vertical: 'middle' };
            if (col === 6) { cell.value = subRenova; cell.numFmt = MONEY; }
            else if (col === 8) { cell.value = subCtta; cell.numFmt = MONEY; }
            else if (col === 9) { cell.value = moi; cell.numFmt = MONEY; }
        });
        r++;

        if (moi !== 0) {
            sheet.mergeCells(r, 1, r, 4);
            const moiLbl = sheet.getCell(r, 1);
            moiLbl.value = '🛠️ MANO DE OBRA INDUSTRIAL — ' + cat;
            moiLbl.font = { name: 'Arial', bold: true, size: 9, color: { argb: C.orange } };
            moiLbl.fill = fillSolid(C.orangeL);
            moiLbl.alignment = { horizontal: 'right', vertical: 'middle' };
            [5, 6, 7, 8, 9].forEach(col => {
                const cell = sheet.getCell(r, col);
                cell.fill = fillSolid(C.orangeL);
                cell.font = { name: 'Arial', bold: true, size: 9, color: { argb: C.orange } };
                cell.alignment = { horizontal: 'right', vertical: 'middle' };
                if (col === 9) { cell.value = moi; cell.numFmt = MONEY; }
            });
            r++;
        }

        r++; // fila en blanco separadora

        totalGeneralRenova += subRenova;
        totalGeneralMOI += moi;
        totalGeneralContratista += subCtta;
    });

    sheet.mergeCells(r, 1, r, 4);
    const totLbl = sheet.getCell(r, 1);
    totLbl.value = 'TOTAL GENERAL';
    totLbl.font = { name: 'Arial', bold: true, size: 11, color: { argb: C.white } };
    totLbl.fill = fillSolid(C.blue);
    totLbl.alignment = { horizontal: 'right', vertical: 'middle' };
    [5, 6, 7, 8, 9].forEach(col => {
        const cell = sheet.getCell(r, col);
        cell.fill = fillSolid(C.blue);
        cell.font = { name: 'Arial', bold: true, size: 11, color: { argb: C.white } };
        cell.alignment = { horizontal: 'right', vertical: 'middle' };
        if (col === 6) { cell.value = totalGeneralRenova; cell.numFmt = MONEY; }
        else if (col === 8) { cell.value = totalGeneralContratista; cell.numFmt = MONEY; }
        else if (col === 9) { cell.value = totalGeneralMOI; cell.numFmt = MONEY; }
    });
    sheet.getRow(r).height = 22;
    r += 2;

    sheet.mergeCells(`A${r}:I${r}`);
    const notaCell = sheet.getCell(`A${r}`);
    notaCell.value = `Base Renova + MOI = Total Contratista   →   ${totalGeneralRenova.toLocaleString('es-CL')} + ${totalGeneralMOI.toLocaleString('es-CL')} = ${(totalGeneralRenova + totalGeneralMOI).toLocaleString('es-CL')}`;
    notaCell.font = { name: 'Arial', italic: true, size: 9, color: { argb: C.gray } };
    notaCell.alignment = { horizontal: 'center', vertical: 'middle' };

    sheet.pageSetup.orientation = 'landscape';
    sheet.pageSetup.fitToPage = true;
    sheet.pageSetup.fitToWidth = 1;
    sheet.pageSetup.fitToHeight = 0;
    sheet.pageSetup.margins = { left: 0.4, right: 0.4, top: 0.4, bottom: 0.4, header: 0.1, footer: 0.1 };
    sheet.views = [{ state: 'frozen', ySplit: filaHeader }];
    sheet.showGridLines = false;

    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const proyecto = document.getElementById('fProyecto').value || 'SIN_PROYECTO';
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `COTIZACION_LIBRE_ANTOFAGASTA_${proyecto.replace(/\s+/g, '_')}.xlsx`;
    link.click();
}

construirTablas();
document.getElementById('fFecha').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
